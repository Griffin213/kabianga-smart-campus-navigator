<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prince AI Knowledge</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
color:#0b5ed7;
margin-bottom:10px;
}

p{
color:#666;
margin-bottom:25px;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
margin-bottom:5px;
}

input, textarea, select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

textarea{
height:120px;
resize:vertical;
}

button{
margin-top:20px;
padding:12px 25px;
background:#0b5ed7;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#084298;
}

table{
width:100%;
margin-top:35px;
border-collapse:collapse;
}

table th,
table td{
border:1px solid #ddd;
padding:12px;
text-align:left;
}

table th{
background:#0b5ed7;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h1>🤖 Prince AI Knowledge Management</h1>

<p>Add new questions and answers that Prince AI can learn.</p>

<label>Question</label>

<input
type="text"
placeholder="Example: Where is the Finance Office?">

<label>Category</label>

<select>

<option>Academics</option>

<option>Administration</option>

<option>Library</option>

<option>Finance</option>

<option>Hostels</option>

<option>ICT</option>

</select>

<label>Answer</label>

<textarea
placeholder="Type Prince AI's answer here..."></textarea>

<button onclick="saveKnowledge()">
💾 Save Knowledge
</button>

<h2 style="margin-top:40px;">Saved Knowledge</h2>

<table>

<tr>

<th>Question</th>

<th>Category</th>

<th>Status</th>

</tr>

<tr>

<td>Where is LTB1?</td>

<td>Academics</td>

<td>✅ Active</td>

</tr>

<tr>

<td>How do I register units?</td>

<td>Academics</td>

<td>✅ Active</td>

</tr>

</table>

<br>

<a href="dashboard.html">

<button>

⬅ Back to Dashboard

</button>

</a>

</div>
<script>

function saveKnowledge(){

const question=document.querySelector("input").value;

const category=document.querySelector("select").value;

const answer=document.querySelector("textarea").value;

if(question==="" || answer===""){

alert("Please enter both the question and the answer.");

return;

}
// Save knowledge permanently

let knowledge = JSON.parse(localStorage.getItem("princeKnowledge")) || [];

knowledge.push({
    question: question,
    category: category,
    answer: answer
});

localStorage.setItem("princeKnowledge", JSON.stringify(knowledge));
const table=document.querySelector("table");

const row=table.insertRow(-1);

row.insertCell(0).innerHTML=question;

row.insertCell(1).innerHTML=category;

row.insertCell(2).innerHTML="✅ Active";

alert("Knowledge saved successfully!");

document.querySelector("input").value="";

document.querySelector("textarea").value="";

}

</script>
</body>
</html>
