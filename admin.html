<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Administrator Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:linear-gradient(135deg,#0b5ed7,#198754);
height:100vh;
display:flex;
justify-content:center;
align-items:center;

}

.login-box{

width:380px;
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
text-align:center;

}

.logo{

width:90px;
height:90px;
margin-bottom:15px;

}

h2{

color:#0b5ed7;
margin-bottom:5px;

}

h4{

color:#555;
margin-bottom:25px;

}

.secure{

color:#198754;
font-weight:bold;
margin-bottom:20px;

}

input{

width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;

}

button{

width:100%;
padding:13px;
margin-top:20px;
background:#0b5ed7;
color:white;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
transition:.3s;

}

button:hover{

background:#084298;

}

.footer{

margin-top:25px;
font-size:13px;
color:#666;
line-height:1.8;

}

.names{

font-weight:bold;
color:#0b5ed7;

}

</style>

</head>

<body>

<div class="login-box">

<img src="logo.png" class="logo">

<h2>University of Kabianga</h2>

<h4>Smart Campus Management System</h4>

<p class="secure">🔒 Secure Administrator Login</p>

<input
type="text"
id="username"
placeholder="👤 Username">

<input
type="password"
id="password"
placeholder="🔑 Password">

<button onclick="loginAdmin()">

🔵 Login

</button>

<div class="footer">

© 2026 University of Kabianga<br>

Smart Campus Management System

<br><br>

Developed by

<div class="names">

Griffin Kipruttoh<br>

David Dodi

</div>

</div>

</div>

<script>

function loginAdmin(){

const username=document.getElementById("username").value;

const password=document.getElementById("password").value;

if(username==="admin" && password==="1234"){

window.location.href="dashboard.html";

}else{

alert("Invalid Username or Password");

}

}

</script>

</body>

</html>
