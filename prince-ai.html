<!DOCTYPE html>
<html>

<head>

<title>Prince AI Assistant</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="ai-page">

    <div class="ai-header">

        🤖 Prince AI

        <p>Your Smart Campus Assistant</p>

    </div>


    <div id="chatBox" class="chat-box">

        <div class="ai-message">
            Hello 👋 I am Prince AI. How can I help you today?
        </div>

    </div>



    <div class="chat-input">

        <input 
        type="text" 
        id="userMessage"
        placeholder="Message Prince AI...">


        <button onclick="sendMessage()">
        Send
        </button>


    </div>


</div>



<script src="knowledge.js"></script>

<script src="prince-ai.js"></script>


</body>

</html>
