
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University of Kabianga Smart Campus Navigator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="logo.png" alt="University of Kabianga Logo" width="100">
    <h1>University of Kabianga</h1>
    <h2>Smart Campus Navigator</h2>
</header>

<main>
    <input type="text" placeholder="Search for a venue...">

    <button>🔍 Search</button>
    <button>📷 Scan QR Code</button>

    <h3>Popular Venues</h3>

    <ul>
        <li>LTB1</li>
        <li>LTB2</li>
        <li>LTB3</li>
        <li>LTB4</li>
    </ul>

    <button>Open Campus Map</button>
</main>

<footer>
    <p>© 2026 University of Kabianga</p>
</footer>

<script src="script.js"></script>
</body>
</html>
