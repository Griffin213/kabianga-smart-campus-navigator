<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    animation:fadeIn 1s;
}

img{
    width:100%;
    height:100vh;
    object-fit:cover;
    animation:slowZoom 8s ease-in-out forwards;
}

.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.35);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
    transition: opacity 0.8s ease;
}

.overlay h1{
    font-size:40px;
    margin-bottom:10px;
}

.overlay p{
    font-size:22px;
}

.developer{
    position:absolute;
    bottom:20px;
    left:0;
    width:100%;
    text-align:center;
    color:white;
    font-size:16px;
    line-height:1.6;
}

.developer p{
    font-size:16px;
    margin-bottom:5px;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}
    @keyframes slowZoom{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.1);
    }
    }
</style>
</head>

<body>

<img src="welcome.jpg">

<div class="overlay">
    <h1>Welcome to University of Kabianga</h1>

    <p>Smart Campus Navigation System</p>

    <div class="developer">
        <p>Developed by</p>
        <strong>Griffin Kipruttoh</strong><br>
        <strong>David Dodi</strong>
    </div>
</div>

<script>
setTimeout(function(){

    document.querySelector(".overlay").style.opacity = "0";
    document.querySelector("img").style.opacity = "0";

    setTimeout(function(){
        window.location.href = "home.html";
    },800);

},2000);
</script>

</body>
</html>
